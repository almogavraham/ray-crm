name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main   # כל push ל-main → פריסה אוטומטית לשני האתרים

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}

      - name: Deploy to admin.ray-crm.com
        run: npx firebase-tools deploy --only hosting:admin --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy to ray-crm.com (all clients)
        run: npx firebase-tools deploy --only hosting:client --token "${{ secrets.FIREBASE_TOKEN }}"
